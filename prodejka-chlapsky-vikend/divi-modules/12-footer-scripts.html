    <!-- ============================================
         SCRIPTS
         ============================================ -->
    <script>
        // ===== CAMPAIGN PHASE SYSTEM =====
        // Změň tuto hodnotu pro aktivaci dalších fází:
        //   1 = základní stránka (bez urgency)
        //   2 = urgency aktivní (odpočet, zbývající místa)
        //   3 = poslední místa (intenzivnější urgency)
        var CAMPAIGN_PHASE = 1;

        // Počet zbývajících míst (aktualizuj ručně)
        var SPOTS_REMAINING = 14;

        // Datum víkendu
        var EVENT_DATE = new Date('2026-04-24T14:00:00');
        // Uzávěrka rezervací (po tomto čase už nepůjde koupit)
        var REGISTRATION_DEADLINE = new Date('2026-04-23T20:00:00');

        // Aktivuj prvky příslušné fáze
        (function() {
            var phaseElements = document.querySelectorAll('[data-campaign-phase]');
            phaseElements.forEach(function(el) {
                var requiredPhase = parseInt(el.getAttribute('data-campaign-phase'));
                var phaseDisplay = el.getAttribute('data-phase-display');
                if (!phaseDisplay) {
                    if (el.classList.contains('urgency-bar')) phaseDisplay = 'flex';
                    else if (el.tagName === 'SPAN') phaseDisplay = 'inline-flex';
                    else phaseDisplay = 'block';
                }
                if (requiredPhase <= CAMPAIGN_PHASE) {
                    el.style.display = phaseDisplay;
                } else {
                    el.style.display = 'none';
                }
            });

            // Aktualizuj zbývající místa
            if (CAMPAIGN_PHASE >= 2) {
                var spotsEl = document.getElementById('spots-remaining');
                if (spotsEl) spotsEl.textContent = SPOTS_REMAINING;
                document.querySelectorAll('.spots-remaining-sync').forEach(function(el) {
                    el.textContent = SPOTS_REMAINING;
                });
                var filled = Math.max(0, 20 - SPOTS_REMAINING);
                // Urgency visual progress bars
                var urgencyPercent = Math.max(0, Math.min(100, (filled / 20) * 100));
                var pricingFill = document.getElementById('urgency-fill-pricing');
                if (pricingFill) pricingFill.style.width = urgencyPercent + '%';
                document.querySelectorAll('.urgency-fill-sync').forEach(function(el) {
                    el.style.width = urgencyPercent + '%';
                });
            }

            // Odpočet
            function updateCountdown() {
                var now = new Date();
                var diff = REGISTRATION_DEADLINE - now;
                if (diff <= 0) diff = 0;
                var days = Math.floor(diff / (1000 * 60 * 60 * 24));
                var hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                var mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.querySelectorAll('.countdown-days-sync').forEach(function(el) {
                    el.textContent = days;
                });
                document.querySelectorAll('.countdown-hours-sync').forEach(function(el) {
                    el.textContent = hours;
                });
                document.querySelectorAll('.countdown-mins-sync').forEach(function(el) {
                    el.textContent = mins;
                });
            }
            if (CAMPAIGN_PHASE >= 2) {
                updateCountdown();
                setInterval(updateCountdown, 60000);
            }
        })();

        // FAQ accordion
        document.querySelectorAll('.objection-question').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var item = btn.parentElement;
                var wasOpen = item.classList.contains('open');
                document.querySelectorAll('.objection').forEach(function(o) {
                    o.classList.remove('open');
                });
                if (!wasOpen) item.classList.add('open');
            });
        });

        // Sticky CTA – show after scrolling past hero
        (function() {
            var hero = document.getElementById('top');
            var stickyBar = document.getElementById('stickyCta');
            if (!hero || !stickyBar) return;

            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        stickyBar.classList.remove('active');
                    } else {
                        stickyBar.classList.add('active');
                    }
                });
            }, { threshold: 0 });

            observer.observe(hero);
        })();
    </script>
